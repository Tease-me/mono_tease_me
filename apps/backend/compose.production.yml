services:
  # Production uses AWS RDS — no local Postgres container. Set DB_URL in server .env.
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teaseme-backend
    working_dir: /usr/src
    command:
      - sh
      - -c
      - >
        alembic -c alembic.ini upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
        --ssl-keyfile=./.cert/key.pem --ssl-certfile=./.cert/cert.pem
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  redisdata:
