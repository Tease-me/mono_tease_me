<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="stylesheet" href="hardcoreSample.css" />
  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@latest/dist/dotlottie-wc.js" type="module"></script>
</head>

<body bgcolor="#000000">
  <div class="hcSampleContainer">
    <div class="hcTopSection">
      <div class="unlockContainer">
        <dotlottie-wc width="100%" src="../src/assets/lottie/unlock.lottie" speed="1" mode="forward" loop
          autoplay></dotlottie-wc>
      </div>
      <div class="textContainer">
        <div class="audioWave">
          <img src="../src/assets//svg/hcAudioWave.svg" alt="" srcset="" />
        </div>
        <div class="flames">
          <dotlottie-wc width="100%" src="../src/assets/lottie/flame.lottie" speed="1" mode="forward" loop
            autoplay></dotlottie-wc>
        </div>
        <div class="hcButton">
          <p class="hcTitle">Play Hardcore Sample</p>
        </div>
      </div>
    </div>
    <div class="bottomSection">Verify Age to unlock 18+ Samples</div>
  </div>
</body>

</html>
