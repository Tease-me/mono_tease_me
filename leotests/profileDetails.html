<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="profileDetails.css" />
  </head>

  <body bgcolor="#181A20" style="margin: 0">

    
    <div class="overlayContainer">
      <div class="innerContainer">
        <div class="profileContainer">
          <h2 class="profileTitle">Olivia Fanza.</h2>
          <div class="topsection">
            <div class="profileCardContainer">
              <div class="profileimageContainer">
                <img
                  src="profileimageplaceholder.png"
                  alt=""
                  srcset=""
                  style="width: 100px; aspect-ratio: 1/1"
                />
                <div class="hearticon">💜</div>
              </div>
              <div class="textDetails">
                <div class="textRow01">
                  <h4 class="plusmodeStatus"><span>18+</span> Mode</h4>
                  <div class="badge">Subscribed</div>
                </div>
                <div class="textRow02">
                  <p>
                    Last Connected:<span
                      style="
                        color: var(--Others-Red, #f54336);
                        font-weight: 400;
                      "
                      >14 Hours Ago</span
                    >
                  </p>
                  <p>Following Since 88/88/88</p>
                </div>
              </div>
            </div>
            <div class="profileSociallinks">
              <div class="socialContainer">🔵</div>
              <div class="socialContainer">🔵</div>
              <div class="socialContainer">🔵</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <img
      class="placeholderImage"
      src="https://picsum.photos/200/300"
      alt=""
      srcset=""
    />
  </body>
</html>
