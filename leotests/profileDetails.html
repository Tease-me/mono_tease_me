<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <link rel="stylesheet" href="profileDetails.css" />
</head>

<body bgcolor="#181A20" style="margin: 0">


  <div class="overlayContainer">
    <div class="innerContainer">
      <div class="profileContainer">
        <h2 class="heading02">Olivia Fanza.</h2>

<div class="profileDetails">
        <!-- section 1 -->
        <div class="section01">
          <div class="profileCardContainer">
            <div class="profileimageContainer">
              <img src="profileimageplaceholder.png" alt="" srcset="" style="width: 100px; aspect-ratio: 1/1" />
              <div class="hearticon">💜</div>
            </div>
            <div class="textDetails">
              <div class="textRow01">
                <h4 class="plusmodeStatus"><span>18+</span> Mode</h4>
                <div class="badge">Subscribed</div>
              </div>
              <div class="textRow02">
                <p>
                  Last Connected:<span style="
                        color: var(--Others-Red, #f54336);
                        font-weight: 400;
                      ">14 Hours Ago</span>
                </p>
                <p>Following Since 88/88/88</p>
              </div>
            </div>
          </div>
          <div class="profileSociallinks">
            <div class="socialContainer"><img src="../src/assets/svg/OnlyFans.svg" /></div>
            <div class="socialContainer"><img src="../src/assets/svg/Instagram.svg" /></div>
            <div class="socialContainer"><img src="../src/assets/svg/TikTok.svg" /></div>
          </div>
        </div>

        <!-- section 2 -->
        <div class="section02">
          <h3 class="heading03">Relationship Statistics</h3>
          <div class="loveScoreCardContainer">
            <div class="row01">
              <div class="body01">Stage Progress</div>
              <div class="heading03">17/100</div>
            </div>
            <div class="row02">
              <div class="placholderBar"></div>
            </div>
            <div class="row03">
              <div class="body02">Strangers</div>
              <div class="body02">Friends</div>
            </div>
          </div>
        </div>

        <!-- section 3 -->
        <div class="section03">
          <img src="/leotests/placholderDiamond.png" alt="">
        </div>


        <!-- section 4 -->
        <div class="section04">
          <h3 class="heading03">Affinities</h3>
          <div class="affinitesCardContainer">

            <div class="affinityContainer">
              <div class="row01">
                <div class="leftCol">
                  <div class="affinityIcon"><img src="../src/assets/svg/Trust.svg" alt=""></div>
                  <div class="body01">Trust</div>
                  <div class="infoIcon"><img src="../src/assets/svg/iconInfo.svg" alt=""></div>
                </div>
                <div class="heading03">45</div>
              </div>
              <div class="row02">
                <div class="placholderBar"></div>
              </div>
            </div>
             <div class="affinityContainer">
              <div class="row01">
                <div class="leftCol">
                  <div class="affinityIcon"><img src="../src/assets/svg/Angles.svg" alt=""></div>
                  <div class="body01">Closeness</div>
                  <div class="infoIcon"><img src="../src/assets/svg/iconInfo.svg" alt=""></div>
                </div>
                <div class="heading03">45</div>
              </div>
              <div class="row02">
                <div class="placholderBar"></div>
              </div>
            </div>

             <div class="affinityContainer">
              <div class="row01">
                <div class="leftCol">
                  <div class="affinityIcon"><img src="../src/assets/svg/KissGray.svg""></div>
                  <div class="body01">Attraction</div>
                  <div class="infoIcon"><img src="../src/assets/svg/iconInfo.svg" alt=""></div>
                </div>
                <div class="heading03">45</div>
              </div>
              <div class="row02">
                <div class="placholderBar"></div>
              </div>
            </div>

             <div class="affinityContainer">
              <div class="row01">
                <div class="leftCol">
                  <div class="affinityIcon"><img src="../src/assets/svg/Shield.svg" alt=""></div>
                  <div class="body01">Safety</div>
                  <div class="infoIcon"><img src="../src/assets/svg/iconInfo.svg" alt=""></div>
                </div>
                <div class="heading03">45</div>
              </div>
              <div class="row02">
                <div class="placholderBar"></div>
              </div>
            </div>

            <div class="spacer"></div>


          </div>




        </div>


</div>










      </div>
    </div>
  </div>

  <img class="placeholderImage" src="https://picsum.photos/200/300" alt="" srcset="" />
</body>

</html>
