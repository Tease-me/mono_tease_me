services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.staging
    container_name: teaseme-backend-staging
    command:
      - sh
      - -c
      - >
        python -m alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port ${STAGING_PORT:-8001}
    env_file:
      - .env
    ports:
      - "${STAGING_PORT:-8001}:${STAGING_PORT:-8001}"
    restart: unless-stopped
