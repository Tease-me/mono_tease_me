      transform-origin: bottom;

      position: absolute;
      top: 0;
      left: 0;
      backdrop-filter: blur(10px);
      mix-blend-mode: multiply;

    }

    .heartfill {
      background: linear-gradient(143deg, hsla(271, 100%, 69.78%, 0.84) 0.84%, rgba(217, 193, 238, 0.8392156862745098) 35.29%, hsla(271, 80%, 31%, 0.84));
      width: 100%;
      height: 100%;
    }

    .heart2 {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 250px;
      aspect-ratio: 1;
      z-index: 3;
      position: absolute;
      top: 0;
      left: 0;
     
    }



    .icon {
      width: 30px;
      height: 30px;
      outline: 1px solid red;
      display: block;

      & svg {
        width: 100%;
      }

    }

    .rr {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1
    }







    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-auto-flow: column;
      place-content: center;
      gap: 30px;
      background: #f9e3e7;

    }


    /*** media query Desktop ***/
    @media (min-width: 32rem) {}
  </style>
