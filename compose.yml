services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: teaseme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d teaseme"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teaseme-backend
    volumes:
      - ./:/usr/src/app
    working_dir: /usr/src/app
    command:
      - sh
      - -c
      - >
        python -m alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
        --ssl-keyfile=./.cert/key.pem --ssl-certfile=./.cert/cert.pem
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
volumes:
  pgdata:
  redisdata:
