<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f222a" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Tease Me — Maintenance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Urbanist:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
      }

      body {
        background-color: #1f222a;
        color: #ffffff;
        font-family: 'DM Sans', 'Urbanist', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 2rem;
      }

      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 2rem;
        max-width: 36rem;
      }

      .logo {
        width: 96px;
        height: 96px;
        border-radius: 1.25rem;
      }

      .title {
        font-family: 'Urbanist', sans-serif;
        font-size: 2rem;
        font-weight: 600;
        line-height: 1.2;
        color: #ffffff;
      }

      .subtitle {
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.6;
        color: #8a8f9e;
        max-width: 28rem;
      }

      @media (max-width: 480px) {
        .title {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        class="logo"
        src="/web-app-manifest-192x192.png"
        alt="Tease Me"
      />
      <div>
        <h1 class="title">We'll be back soon</h1>
      </div>
      <p class="subtitle">
        Tease Me is currently undergoing maintenance. We'll be back shortly — thank you for your patience.
      </p>
    </div>
  </body>
</html>
